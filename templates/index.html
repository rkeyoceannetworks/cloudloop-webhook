<!DOCTYPE html>
<html>
<head>
    <title>Satellite Command Center</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; padding: 40px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #263238; margin-top: 0; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f8f9fa; color: #546e7a; padding: 12px; font-size: 0.8em; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #cfd8dc; }
        .device-id { font-weight: bold; color: #1a73e8; }
        .status-pill { background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 50px; font-size: 0.8em; font-weight: bold; }
        .timestamp { color: #90a4ae; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛰️ Local Satellite Archive</h1>
        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Device</th>
                    <th>Status</th>
                    <th>Decoded Message</th>
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    <td class="timestamp">{{ row['received_at'] }}</td>
                    <td class="device-id">{{ row['device'] or 'Unknown' }}</td>
                    <td><span class="status-pill">{{ row['status'] or 'N/A' }}</span></td>
                    <td>{{ row['message'] or '---' }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
