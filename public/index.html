<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Fleet Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #1a73e8; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #1557b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #ddd; text-align: left; vertical-align: top; }
        th { background-color: #f8f9fa; color: #5f6368; font-weight: 600; text-transform: uppercase; font-size: 0.85em; }
        tr:hover { background-color: #f1f3f4; }
        .status-badge { background: #e6f4ea; color: #137333; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; font-weight: bold; }
        .binary-badge { background: #fce8e6; color: #c5221f; padding: 5px 10px; border-radius: 20px; font-size: 0.85em; font-weight: bold; display: inline-block;}
        .raw-data { font-family: monospace; font-size: 0.9em; color: #333; background: #f8f9fa; padding: 8px; border-radius: 4px; display: block; word-break: break-all; }
        
        /* New styles for the JSON dropdown */
        details { margin-top: 12px; }
        summary { cursor: pointer; color: #1a73e8; font-size: 0.85em; font-weight: bold; outline: none; }
        summary:hover { text-decoration: underline; }
        .json-dump { font-family: monospace; font-size: 0.75em; color: #444; background: #2d2d2d; color: #a9b7c6; padding: 12px; border-radius: 4px; overflow-x: auto; white-space: pre-wrap; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-bar">
        <div>
            <h1>🛰️ Satellite Fleet Dashboard</h1>
            <p>Live telemetry and data from Ground Control Cloudloop.</p>
        </div>
        <button onclick="fetchData()">🔄 Refresh Data</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 15%;">Time (Local)</th>
                <th style="width: 15%;">Device ID</th>
                <th style="width: 10%;">Status</th>
                <th style="width: 60%;">Message / Payload</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <tr><td colspan="4" style="text-align: center;">Loading satellite data...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Helper function to safely escape HTML inside JSON so it doesn't break the page
    function escapeHtml(unsafe) {
        return (unsafe || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    // Smart function to detect Text vs Binary
    function processPayload(msg) {
        if (!msg) return "<em>No payload data</em>";
        if (typeof msg !== 'string') return escapeHtml(JSON.stringify(msg));

        // 1. Check if the string is purely Hexadecimal (common for satellite payloads)
        const isHex = /^[0-9A-Fa-f]+$/.test(msg) && msg.length % 2 === 0 && msg.length > 0;

        if (isHex) {
            let decodedText = '';
            for (let i = 0; i < msg.length; i += 2) {
                decodedText += String.fromCharCode(parseInt(msg.substr(i, 2), 16));
            }
            
            // 2. Check if the decoded text consists of standard printable keyboard characters
            const isPrintable = /^[\x20-\x7E\r\n\t]+$/.test(decodedText);
            
            if (isPrintable) {
                return escapeHtml(decodedText); // It was hex-encoded text!
            } else {
                return `<span class="binary-badge">🗜️ Binary File (${msg.length / 2} bytes)</span>`;
            }
        }

        // If it's not Hex, just assume it's standard text
        return escapeHtml(msg);
    }

    async function fetchData() {
        const tbody = document.getElementById('data-table-body');
        
        try {
            const response = await fetch('/data'); 
            const data = await response.json();

            tbody.innerHTML = ''; 

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No transmissions received yet.</td></tr>';
                return;
            }

            data.forEach(row => {
                let parsed = {};
                try {
                    parsed = JSON.parse(row.raw_payload);
                } catch(e) {
                    parsed = { error: "Could not parse JSON", raw: row.raw_payload };
                }

                const time = new Date(row.received_at).toLocaleString();
                const deviceId = parsed.device_id || (parsed.identity && parsed.identity.hardware && parsed.identity.hardware.imei) || "Unknown";
                const status = parsed.status || "Transmitted";
                
                // Find the raw message string
                const rawMessage = parsed.message || (parsed.payload && parsed.payload.message) || null;
                
                // Run it through our smart detector
                const displayData = processPayload(rawMessage);
                
                // Format the full JSON nicely for the dropdown
                const fullJsonString = escapeHtml(JSON.stringify(parsed, null, 2));

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${time}</strong></td>
                    <td>${deviceId}</td>
                    <td><span class="status-badge">${status}</span></td>
                    <td>
                        <span class="raw-data">${displayData}</span>
                        <details>
                            <summary>Show Full JSON</summary>
                            <pre class="json-dump">${fullJsonString}</pre>
                        </details>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error("Error:", error);
            tbody.innerHTML = '<tr><td colspan="4" style="color:red; text-align: center;">Error loading data from database.</td></tr>';
        }
    }

    window.onload = fetchData;
</script>

</body>
</html>
